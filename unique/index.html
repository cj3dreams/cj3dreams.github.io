<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открываем настройки (только схемы)</title>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: #eee;
            text-align: center;
            padding: 20px;
        }
        #counter {
            font-size: 60px;
            font-weight: bold;
            color: #4fc3f7;
        }
        #log {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            font-size: 13px;
            font-family: monospace;
            margin-top: 20px;
        }
        .entry {
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }
        .uri {
            color: #ffb74d;
        }
        .num {
            color: #4fc3f7;
        }
        button {
            padding: 10px 25px;
            background: #4fc3f7;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>🔧 Бьём в настройки</h1>
    <div id="counter">0</div>
    <p>попыток (каждую секунду)</p>
    <button onclick="addMoreSchemes()">➕ Добавить ещё схем</button>
    <div id="log">Лог...</div>

    <script>
        // ---------- ТОЛЬКО ПРОСТЫЕ СХЕМЫ (без intent) ----------
        let schemes = [
            'settings://',
            'system_settings://',
            'android.settings://',
            'settings:/',
            'system-settings://',
            'android-settings://',
            'config://',
            'device_settings://',
            'com.android.settings://',
            'settings.app://',
            'system://settings',
            'android://settings',
            'settings.ui://',
            'sys_settings://',
            'settings_android://'
        ];

        // Дополнительные вариации (чтобы было больше)
        for (let i = 0; i < 30; i++) {
            schemes.push(`settings${i}://`);
            schemes.push(`system${i}://`);
        }

        // Убираем дубли
        schemes = [...new Set(schemes)];

        let index = 0;
        let attempts = 0;
        const log = document.getElementById('log');

        function tryOpenScheme() {
            const uri = schemes[index % schemes.length];
            index++;
            attempts++;
            document.getElementById('counter').textContent = attempts;

            // Логируем
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML = `<span class="num">#${attempts}</span> <span class="uri">${uri}</span>`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 150) log.removeChild(log.children[0]);

            // Открываем через iframe (без перезагрузки страницы)
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = uri;   // ← Строго как есть, браузер не добавляет домен
            document.body.appendChild(iframe);
            setTimeout(() => iframe.remove(), 1500);
        }

        // Запуск
        tryOpenScheme();
        setInterval(tryOpenScheme, 1000);

        // Кнопка для добавления новых (можно дописать любые)
        window.addMoreSchemes = function() {
            const extra = [
                'settings_extra://',
                'android_settings://',
                'device://settings',
                'systemconfig://',
                'preferences://'
            ];
            let added = 0;
            for (let s of extra) {
                if (!schemes.includes(s)) {
                    schemes.push(s);
                    added++;
                }
            }
            alert(`Добавлено ${added} новых схем. Всего: ${schemes.length}`);
        };

        console.log('Всего схем:', schemes.length);
    </script>
</body>
</html>
